# ── API 프록시 redirect (SPA 규칙보다 반드시 위에 있어야 함) ─────────────────
# force = true: 파일이 존재하더라도 강제로 redirect 적용
[[redirects]]
  from = "/api/v3/*"
  to = "https://prod.dorder-api.shop/api/v3/:splat"
  status = 200
  force = true

# ── SPA 라우팅 (모든 경로를 index.html로) ────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
